version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '6 1 9 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'NurPech'
    versioning-strategy: 'increase'
    cooldown:
      default-days: 7

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '6 1 9 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'NurPech'
